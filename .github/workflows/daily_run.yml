name: KOSPI Detector

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  detector:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Restore Google Sheets key (optional)
        env:
          GSHEET_KEY: ${{ secrets.GSHEET_KEY }}
        run: |
          if [ -n "$GSHEET_KEY" ]; then
            echo "$GSHEET_KEY" | base64 -d > gsheet_key.json
            echo "gsheet_key.json restored"
          else
            echo "GSHEET_KEY not set; skip sheet logging key restore"
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run detector
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python detector.py
